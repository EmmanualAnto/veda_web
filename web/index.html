<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a; /* dark professional background */
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .loader {
    text-align: center;
    max-width: 90%;
  }

  .spinner {
    width: 42px;
    height: 42px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top: 4px solid #ffffff;
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .title {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    opacity: 0.9;
  }

  .tip {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .title { font-size: 14px; }
    .tip { font-size: 12px; }
  }
</style>
</head>

<body>

  <!-- Loading Screen -->
  <div id="loading" class="loader">
  <div class="spinner"></div>
  <div class="title">Loading secure system</div>
  <div id="tip" class="tip">Initializing Veda Systems platform...</div>
</div>
  <script>
    const tips = [
      "Did you know? Structured IT systems improve scalability and business performance.",
      "Did you know? Proper network architecture reduces downtime and improves reliability.",
      "Did you know? Custom software helps automate business operations efficiently.",
      "Did you know? Strong cybersecurity frameworks protect enterprise data from threats.",
      "Did you know? Cloud-based infrastructure enables faster business expansion at lower cost."
    ];

    let i = 0;

    setInterval(() => {
      document.getElementById("tip").innerText = tips[i];
      i = (i + 1) % tips.length;
    }, 3000);

    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading');
      if (loader) loader.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>

</body>
